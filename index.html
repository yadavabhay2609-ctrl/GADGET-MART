<!DOCTYPE html>
<html>
<head>
    <title>GadgetMart</title>
    <link rel="stylesheet" href="css/stylesheet.css">
</head>
<body>

    <h1>GadgetMart</h1>

    <div class="card">
        <img src="assets/smartphone.webp" alt="Smartphone">

        <h2 class="title">Smartphone</h2>

        <p class="price">₹15,999</p>

        <ul>
            <li>6GB RAM</li>
            <li>128GB Storage</li>
            <li>5000mAh Battery</li>
        </ul>
    </div>

    <div class="card">
        <img src="assets/lap.webp" alt="Laptop">

        <h2 class="title">Laptop</h2>

        <p class="price">₹49,999</p>

        <ul>
            <li>Intel i5 Processor</li>
            <li>8GB RAM</li>
            <li>512GB SSD</li>
        </ul>
    </div>

</body>
</html>
